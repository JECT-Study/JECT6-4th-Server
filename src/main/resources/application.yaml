spring:
  application:
    name: boost-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/boost}
    username: ${SPRING_DATASOURCE_USERNAME:boost}
    password: ${SPRING_DATASOURCE_PASSWORD:boost}
    driver-class-name: org.postgresql.Driver

  # https://docs.spring.io/spring-ai/reference/api/vectordbs/pgvector.html
  ai:
    vectorstore:
      type: ${SPRING_AI_VECTORSTORE_TYPE:none}
      pgvector:
        index-type: ${SPRING_AI_VECTORSTORE_PGVECTOR_INDEX_TYPE:hnsw}
        distance-metric: ${SPRING_AI_VECTORSTORE_PGVECTOR_DISTANCE_METRIC:cosine}
        dimension: ${SPRING_AI_VECTORSTORE_PGVECTOR_DIMENSION:1536}
        max-documnets: ${SPRING_AI_VECTORSTORE_PGVECTOR_MAX_DOCUMENTS:10000}
        initialize-schema: ${SPRING_AI_VECTORSTORE_PGVECTOR_INITIALIZE_SCHEMA:true}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    locations: classpath:db/migration

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_OAUTH_CLIENT_ID:}
            client-secret: ${KAKAO_OAUTH_CLIENT_SECRET:}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: ${KAKAO_OAUTH_REDIRECT_URI:{baseUrl}/login/oauth2/code/kakao}
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

jwt:
  issuer: ${JWT_ISSUER:boost}
  secret: ${JWT_SECRET:boost-local-development-secret-key-change-me}
  access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:30m}
  refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:7d}
