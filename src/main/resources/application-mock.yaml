server:
  port: ${MOCK_SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:h2:mem:boost_mock;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  ai:
    vectorstore:
      type: none

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: mock-kakao-client-id
            client-secret: mock-kakao-client-secret

mock:
  enabled: true
